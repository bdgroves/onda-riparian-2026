name: onda-riparian
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Earth Engine + geospatial core
  - earthengine-api>=1.6
  - geemap>=0.35
  - leafmap>=0.44
  - geopandas>=1.0
  - shapely>=2.0
  - fiona>=1.10
  - pyproj>=3.6
  - rasterio>=1.4
  - rioxarray>=0.17
  - xarray>=2024.9
  - dask>=2024.9
  # Analysis
  - pandas>=2.2
  - numpy>=2.0
  - scipy>=1.14
  - scikit-learn>=1.5
  - statsmodels>=0.14
  - pymannkendall
  - ruptures                # change-point detection
  # Viz + notebooks
  - matplotlib>=3.9
  - seaborn>=0.13
  - plotly>=5.24
  - jupyterlab>=4.2
  - ipywidgets>=8.1
  # Dashboard
  - streamlit>=1.39
  # Dev
  - pytest>=8.3
  - ruff>=0.7
  - pip
  - pip:
      - pystac-client>=0.8   # for Microsoft Planetary Computer fallback
      - planetary-computer>=1.0
